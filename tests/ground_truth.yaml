- id: coach_22_23
  description: "Trainer 22/23: Jason Morgan (bis Dez) + Martin Jiranek (ab Dez)"
  source: "Wikipedia + Lokalpresse"
  query: >
    SELECT c.name FROM falken.coach_tenures ct
    JOIN falken.coaches c ON c.id = ct.coach_id
    JOIN falken.teams t ON t.id = ct.team_id
    WHERE t.name = 'Heilbronner Falken' AND ct.start_date = '2022-09-01'
    ORDER BY c.name
  expected:
    - {name: "Jason Morgan"}
    - {name: "Martin Jiranek"}

