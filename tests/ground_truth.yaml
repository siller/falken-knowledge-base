# =====================================================================
# I) WIRECKLICHE COVERAGE-AUDITS
# =====================================================================
- id: total_games_min
  description: "Mindestens 5000 Spiele insgesamt nach Backfill"
  source: "del-2.org Bulk-Load erwartet"
  query: >
    SELECT (CASE WHEN COUNT(*) >= 5000 THEN 1 ELSE 0 END) AS ok FROM falken.games
  expected: [{ok: 1}]

- id: player_stats_12_seasons
  description: "12 Saisons (2013/14-2024/25) mit Falken-Player-Stats aus EP"
  source: "EliteProspects-Backfill (erweitert auf 12 Saisons)"
  query: >
    SELECT COUNT(DISTINCT s.label) AS n
    FROM falken.player_seasons ps
    JOIN falken.seasons s ON s.id = ps.season_id
    JOIN falken.teams t ON t.id = ps.team_id
    WHERE t.name = 'Heilbronner Falken'
  expected: [{n: 12}]

- id: del2_seasons_with_full_schedule
  description: "10 DEL2-Saisons (2013/14-2022/23) mit kompletter Hauptrunde Falken"
  source: "del-2.org-Backfill"
  query: >
    WITH falken_hr AS (
      SELECT s.label, COUNT(*) AS n FROM falken.games g
      JOIN falken.seasons s ON s.id = g.season_id
      JOIN falken.teams ht ON ht.id = g.home_team_id
      JOIN falken.teams at ON at.id = g.away_team_id
      WHERE s.league = 'DEL2' AND g.game_type = 'regular'
        AND (ht.name = 'Heilbronner Falken' OR at.name = 'Heilbronner Falken')
      GROUP BY s.label
    )
    SELECT COUNT(*) AS n FROM falken_hr WHERE n >= 48
  expected: [{n: 10}]

