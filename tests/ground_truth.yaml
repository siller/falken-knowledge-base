- id: game_06_02_2026_11_3
  description: "06.02.2026 Heimspiel vs Bayreuth: Falken 11:3"
  source: "Live + del-2.org"
  query: >
    SELECT g.date::date AS date, ht.name AS home, g.home_score, g.away_score, at.name AS away
    FROM falken.games g
    JOIN falken.teams ht ON ht.id = g.home_team_id
    JOIN falken.teams at ON at.id = g.away_team_id
    WHERE g.date::date = '2026-02-06' AND ht.name = 'Heilbronner Falken'
  expected:
    - {date: "2026-02-06", home: "Heilbronner Falken", home_score: 11, away_score: 3, away: "Bayreuth Tigers"}

- id: bayreuth_falken_count_22_23
  description: "Falken vs Bayreuth DEL2 22/23 Hauptrunde: 4 Spiele"
  source: "del-2.org"
  query: >
    SELECT COUNT(*) AS n FROM falken.games g
    JOIN falken.seasons s ON s.id = g.season_id
    JOIN falken.teams ht ON ht.id = g.home_team_id
    JOIN falken.teams at ON at.id = g.away_team_id
    WHERE s.label = '2022/23' AND s.league = 'DEL2' AND g.game_type = 'regular'
      AND ((ht.name = 'Heilbronner Falken' AND at.name = 'Bayreuth Tigers')
        OR (ht.name = 'Bayreuth Tigers' AND at.name = 'Heilbronner Falken'))
  expected: [{n: 4}]

- id: highest_score_25_26
  description: "Höchstes Falken-Tor-Ergebnis 25/26: 11 (vs Bayreuth)"
  source: "Live"
  query: >
    SELECT GREATEST(
        MAX(CASE WHEN ht.name = 'Heilbronner Falken' THEN g.home_score ELSE 0 END),
        MAX(CASE WHEN at.name = 'Heilbronner Falken' THEN g.away_score ELSE 0 END)
    ) AS max_goals
    FROM falken.games g
    JOIN falken.teams ht ON ht.id = g.home_team_id
    JOIN falken.teams at ON at.id = g.away_team_id
    JOIN falken.seasons s ON s.id = g.season_id
    WHERE s.label = '2025/26' AND s.league = 'Oberliga Süd' AND g.game_type = 'regular'
      AND (ht.name = 'Heilbronner Falken' OR at.name = 'Heilbronner Falken')
  expected: [{max_goals: 11}]

# =====================================================================
# F) PLAYOFF-SERIEN
# =====================================================================
- id: playdown_22_23_R2_bayreuth
  description: "Play-Down R2 22/23: Falken 2:4 Bayreuth (Abstieg!)"
  source: "del-2.org + Wikipedia"
  query: >
    SELECT ts.wins_a, ts.wins_b, tw.name AS winner
    FROM falken.playoff_series ts
    JOIN falken.seasons s ON s.id = ts.season_id
    JOIN falken.teams ta ON ta.id = ts.team_a_id
    JOIN falken.teams tb ON tb.id = ts.team_b_id
    LEFT JOIN falken.teams tw ON tw.id = ts.winner_team_id
    WHERE s.label = '2022/23' AND ts.round = 'Play-Down R2'
      AND ta.name = 'Heilbronner Falken'
  expected:
    - {wins_a: 2, wins_b: 4, winner: "Bayreuth Tigers"}

- id: playoff_21_22_halbfinale_frankfurt
  description: "Halbfinale 21/22: Falken 0:4 Löwen Frankfurt"
  source: "del-2.org"
  query: >
    SELECT tw.name AS winner
    FROM falken.playoff_series ts
    JOIN falken.seasons s ON s.id = ts.season_id
    JOIN falken.teams ta ON ta.id = ts.team_a_id
    JOIN falken.teams tb ON tb.id = ts.team_b_id
    LEFT JOIN falken.teams tw ON tw.id = ts.winner_team_id
    WHERE s.label = '2021/22' AND ts.round = 'Halbfinale'
      AND (ta.name = 'Heilbronner Falken' OR tb.name = 'Heilbronner Falken')
  expected:
    - {winner: "Löwen Frankfurt"}

- id: playdown_15_16_klassenerhalt
  description: "15/16 Play-Downs: Falken im Play-Down R2 (Klassenerhalt durch Landshut-Lizenzverlust)"
  source: "Wikipedia DEL2 2015/16"
  query: >
    SELECT COUNT(*) AS n FROM falken.playoff_series ts
    JOIN falken.seasons s ON s.id = ts.season_id
    JOIN falken.teams ta ON ta.id = ts.team_a_id
    JOIN falken.teams tb ON tb.id = ts.team_b_id
    WHERE s.label = '2015/16' AND ts.round LIKE 'Play-Down%'
      AND (ta.name = 'Heilbronner Falken' OR tb.name = 'Heilbronner Falken')
  expected: [{n: 2}]  # mindestens 2 Playdown-Serien (R1 + R2)

